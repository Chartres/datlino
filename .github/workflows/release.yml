name: Release

# Builds notarizable / signable artefacts for every push to `release/**`
# and for manually-triggered runs. Signing + notarization steps are
# guarded on the presence of the relevant secrets — the workflow still
# runs end-to-end on forks without them, producing *unsigned* but
# functional artefacts for smoke testing.
#
# Matrix:
#   macOS-14 (arm64) → .dmg + .app  (universal if lipo works; else arm64)
#   macOS-13 (x64)   → .dmg         (Intel Macs)
#   ubuntu-latest    → .AppImage + .deb
#   windows-latest   → .msi + .exe
#
# Secrets the pipeline reads when present:
#   APPLE_CERTIFICATE           base64 of the Developer-ID .p12
#   APPLE_CERTIFICATE_PASSWORD  .p12 password
#   APPLE_SIGNING_IDENTITY      "Developer ID Application: Paja Dravec (TEAMID)"
#   APPLE_ID                    Apple-ID email for notarization
#   APPLE_PASSWORD              app-specific password
#   APPLE_TEAM_ID               10-char team id
#   WINDOWS_CERTIFICATE         base64 of the code-signing .pfx
#   WINDOWS_CERTIFICATE_PASSWORD  .pfx password
#
# On tags `v*.*.*` the artefacts are uploaded to a GitHub Release and
# the tauri-updater latest.json is pushed to the `updater-endpoint`
# branch so `tauri update` clients find them (DIS-002 piggy-backs on
# this hook).

on:
  workflow_dispatch:
  push:
    branches: ['release/**']
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm
            os: macos-14
            rust_target: aarch64-apple-darwin
            bundle_args: ''
          - name: macos-intel
            os: macos-13
            rust_target: x86_64-apple-darwin
            bundle_args: ''
          - name: linux
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            bundle_args: ''
          - name: windows
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_args: ''

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # ---------- toolchain ----------
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ---------- Linux system libs ----------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev libxdo-dev \
            tesseract-ocr tesseract-ocr-ces tesseract-ocr-slk \
            tesseract-ocr-eng poppler-utils

      # ---------- macOS code signing ----------
      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain

      # ---------- Windows code signing ----------
      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          Import-PfxCertificate -FilePath "$env:RUNNER_TEMP\cert.pfx" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force)

      # ---------- frontend + tauri build ----------
      - name: Build frontend
        run: npm run build

      - name: Build + bundle Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_SIGNING_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_SIGNING_KEY_PASSWORD }}
        run: |
          npx tauri build --target ${{ matrix.rust_target }} ${{ matrix.bundle_args }}

      # ---------- collect artefacts ----------
      - uses: actions/upload-artifact@v4
        with:
          name: datlino-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.sig
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
