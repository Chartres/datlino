<!-- Datlino — Scholarly Peck logo v2.
     Closer to brand concept 1: a classical woodpecker silhouette with
     flowing red crest, chisel beak, curved body, and a branch perch.
     The subtle keyboard grid lives inside the wing/body panel.
     Palette: deep-red #b3271f, charcoal #292524, cream highlights
     #f7f3ec. Designed to read at 32 px and scale up cleanly.
     Replace with final vector art when available. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160" role="img" aria-label="Datlino woodpecker logo">
  <defs>
    <pattern id="keybed2" width="7" height="7" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" fill="#292524"/>
      <rect x="0" y="0" width="6" height="3" fill="#3a3632"/>
      <rect x="0" y="4" width="6" height="3" fill="#3a3632"/>
    </pattern>
  </defs>

  <!-- Branch perch -->
  <path d="M12 138 Q 70 144 128 138 L 128 144 Q 70 150 12 144 Z"
        fill="#5a4a2f" stroke="#3a2e1c" stroke-width="1"/>

  <!-- Tail feathers (red) -->
  <path d="M98 90 L 136 96 L 130 104 L 126 100 L 124 108 L 120 100 L 116 108 L 114 100 Z"
        fill="#b3271f" stroke="#8a1d17" stroke-width="0.8"/>

  <!-- Body silhouette -->
  <path d="M 42 42
           C 40 32, 46 22, 58 18
           C 68 15, 78 17, 86 22
           L 96 32
           C 102 36, 104 44, 104 54
           L 102 104
           C 102 118, 94 128, 82 134
           L 74 136
           L 72 138
           L 62 138
           L 60 134
           L 52 132
           C 42 128, 34 118, 34 104
           L 36 62
           C 36 54, 38 48, 42 42 Z"
        fill="#292524" stroke="#1c1917" stroke-width="1.2"/>

  <!-- Wing panel with keyboard grid -->
  <path d="M 48 58
           C 50 54, 56 52, 64 52
           L 84 56
           C 90 58, 94 62, 94 70
           L 92 98
           C 92 106, 86 112, 78 112
           L 60 110
           C 52 108, 48 102, 48 94 Z"
        fill="url(#keybed2)" stroke="#1c1917" stroke-width="0.8"/>

  <!-- Small wing-tip highlight -->
  <path d="M 82 100 L 90 96 L 88 106 L 82 108 Z"
        fill="#3a3632"/>

  <!-- Red crest (classic woodpecker peak) -->
  <path d="M 60 16
           C 52 10, 50 4, 56 2
           C 62 0, 70 4, 76 10
           C 82 6, 88 8, 88 14
           C 88 18, 84 22, 80 22
           L 62 24
           C 58 24, 56 20, 60 16 Z"
        fill="#b3271f" stroke="#8a1d17" stroke-width="0.8"/>

  <!-- Red cheek stripe -->
  <path d="M 42 42 L 56 38 L 54 46 L 42 48 Z"
        fill="#b3271f"/>

  <!-- Head shape (slightly offset from body) -->
  <path d="M 42 42
           C 40 30, 50 22, 60 22
           L 80 22
           C 88 22, 94 28, 94 34
           L 94 44
           C 94 50, 88 52, 82 52
           L 52 52
           C 46 52, 42 48, 42 42 Z"
        fill="#292524" stroke="#1c1917" stroke-width="1.2"/>

  <!-- Red cheek stripe on head (signature woodpecker marking) -->
  <path d="M 58 46 L 78 42 L 78 50 L 58 52 Z"
        fill="#b3271f"/>

  <!-- Eye -->
  <circle cx="66" cy="34" r="3.5" fill="#f7f3ec"/>
  <circle cx="66.8" cy="34.5" r="1.8" fill="#292524"/>
  <circle cx="67.2" cy="33.8" r="0.6" fill="#f7f3ec"/>

  <!-- Chisel beak -->
  <path d="M 42 38
           L 18 34
           L 22 42
           L 42 46 Z"
        fill="#3a3632" stroke="#1c1917" stroke-width="0.8"/>
  <path d="M 22 42 L 42 46 L 42 38"
        fill="#292524"/>

  <!-- Feet -->
  <path d="M 58 138 L 56 146 L 52 146 M 58 138 L 60 146 L 64 146
           M 72 138 L 70 146 L 66 146 M 72 138 L 74 146 L 78 146"
        stroke="#3a2e1c" stroke-width="1.8" stroke-linecap="round"
        fill="none"/>
</svg>
