<!-- Datlino — Scholarly Peck logo.
     Concept: a standing woodpecker silhouette with a red crest and a
     subtle keyboard-grid pattern inside the body, evoking "studying +
     pecking at keys". Draws on the brand palette:
     deep-red  #b3271f  (crest, tail accent)
     charcoal  #292524  (body, beak, eye ring)
     cream     #f7f3ec  (grid lines, belly)

     Designed to read at 24 px (tab icon), 48 px (nav), and 128 px (splash).
     Straight-edged, minimal — sits next to a monospace wordmark cleanly.
     Swap with the final vector when ready. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" role="img" aria-label="Datlino woodpecker logo">
  <defs>
    <pattern id="keybed" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#292524"/>
      <path d="M0 0 L8 0 M0 4 L8 4 M0 0 L0 8 M4 0 L4 8" stroke="#f7f3ec" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <clipPath id="body-clip">
      <path d="M28 48
               C 28 40, 34 32, 46 30
               L 70 30
               C 80 30, 88 36, 90 48
               L 92 96
               C 92 104, 88 112, 80 116
               L 72 120
               L 72 128
               C 72 132, 70 134, 66 134
               L 50 134
               C 46 134, 44 132, 44 128
               L 44 120
               C 36 118, 30 112, 28 104 Z"/>
    </clipPath>
  </defs>

  <!-- Tail — a deep-red flag behind the body -->
  <path d="M78 100 L108 108 L96 118 L92 112 L90 120 L86 112 Z"
        fill="#b3271f"/>

  <!-- Body (charcoal) with the clipped keyboard-grid pattern -->
  <g clip-path="url(#body-clip)">
    <rect x="20" y="28" width="80" height="108" fill="#292524"/>
    <rect x="44" y="60" width="44" height="52" fill="url(#keybed)"/>
  </g>
  <!-- Body outline + belly highlight -->
  <path d="M28 48
           C 28 40, 34 32, 46 30
           L 70 30
           C 80 30, 88 36, 90 48
           L 92 96
           C 92 104, 88 112, 80 116
           L 72 120
           L 72 128
           C 72 132, 70 134, 66 134
           L 50 134
           C 46 134, 44 132, 44 128
           L 44 120
           C 36 118, 30 112, 28 104 Z"
        fill="none" stroke="#292524" stroke-width="1.5"/>

  <!-- Red crest + face -->
  <path d="M46 30
           C 40 20, 36 14, 42 10
           C 48 8, 58 10, 64 18
           C 68 22, 70 26, 70 30 Z"
        fill="#b3271f"/>
  <path d="M46 30
           C 46 22, 52 18, 60 18
           C 64 18, 68 22, 70 30 Z"
        fill="#b3271f"/>

  <!-- Chisel beak -->
  <path d="M22 44 L40 38 L40 48 Z" fill="#292524"/>

  <!-- Eye -->
  <circle cx="48" cy="28" r="2.2" fill="#f7f3ec"/>
  <circle cx="48.4" cy="28.2" r="1" fill="#292524"/>

  <!-- Foot perching lines -->
  <path d="M52 134 L50 140 M58 134 L58 140 M64 134 L66 140"
        stroke="#292524" stroke-width="1.5" stroke-linecap="round"/>
</svg>
